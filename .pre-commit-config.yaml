repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      # Run the linter
      - id: ruff-check
        args: [ --fix ]
      # Run the formatter
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        pass_filenames: false
        files: "^backend/"
        entry: bash -c 'cd backend && mypy .'
        additional_dependencies:
          - django
          - djangorestframework
          - psycopg
          - django-constance
          - redis
          - django-money
          - django-stubs
          - djangorestframework-stubs
          - pytest
          - pytest-django
