repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      # Run the linter
      - id: ruff-check
        args: [ --fix ]
      # Run the formatter
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        pass_filenames: false
        files: "^backend/"
        entry: bash -c 'cd backend && mypy --show-traceback .'
        additional_dependencies:
          - django
          - django-constance
          - django-cors-headers
          - django-debug-toolbar
          - django-health-check
          - django-money
          - django-prometheus
          - django-stubs
          - django-stubs-ext
          - djangorestframework
          - djangorestframework-stubs
          - factory-boy
          - psycopg
          - pytest
          - pytest-django
          - python-dotenv
          - python-json-logger
          - redis
          - sentry-sdk
          - types-factory-boy
          - whitenoise
