services:
  db:
    ports:
      - "8888:5432"

  backend:
    build:
      args:
        NO_DEV_DEPS: 0
    entrypoint: ./entrypoint.sh
    environment:
      DJANGO_DEBUG: 1
      LOG_LEVEL: DEBUG
      SENTRY_ENVIRONMENT: development
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv
        - action: rebuild
          path: ./backend/uv.lock
        - action: rebuild
          path: ./backend/pyproject.toml

  frontend:
    image: oven/bun:1-alpine
    build: !reset null
    working_dir: /app
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port 80"
    environment:
      VITE_API_PROXY: http://backend:8000
    develop:
      watch:
        - action: sync
          path: ./frontend
          initial_sync: true
          target: /app
          ignore:
            - node_modules/
            - package.json
            - bun.lock
            - vite.config.ts
            - tsconfig.json
        - action: sync+restart
          initial_sync: true
          path: ./frontend/node_modules
          target: /app/node_modules
        - action: sync+restart
          initial_sync: true
          path: ./frontend/package.json
          target: /app/package.json
        - action: sync+restart
          initial_sync: true
          path: ./frontend/bun.lock
          target: /app/bun.lock
        - action: sync+restart
          initial_sync: true
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
        - action: sync+restart
          initial_sync: true
          path: ./frontend/tsconfig.json
          target: /app/tsconfig.json
